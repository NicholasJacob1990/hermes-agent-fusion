name: Sync enhanced (outsourc-e/hermes-agent)

on:
  schedule:
    # Weekly — Monday 11:00 UTC (offset +1h from vanilla weekly sync)
    - cron: "0 11 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force run even if no enhanced commits"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ENHANCED_REPO: outsourc-e/hermes-agent
      ENHANCED_URL: https://github.com/outsourc-e/hermes-agent.git
      ENHANCED_REMOTE: enhanced
      # Isolate untrusted workflow_dispatch input in env per security best-practice
      # (never inline ${{ github.event.* }} directly in run: commands).
      FORCE_INPUT: ${{ github.event.inputs.force }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add "$ENHANCED_REMOTE" "$ENHANCED_URL" 2>/dev/null || true
          git fetch "$ENHANCED_REMOTE" main

      - name: Detect divergence
        id: detect
        run: |
          BEHIND=$(git rev-list --count "HEAD..${ENHANCED_REMOTE}/main")
          AHEAD=$(git rev-list --count "${ENHANCED_REMOTE}/main..HEAD")
          ENHANCED_HEAD=$(git rev-parse --short "${ENHANCED_REMOTE}/main")
          {
            echo "behind=$BEHIND"
            echo "ahead=$AHEAD"
            echo "enhanced_head=$ENHANCED_HEAD"
          } >> "$GITHUB_OUTPUT"
          echo "Behind ${ENHANCED_REMOTE}/main by $BEHIND commits, ahead by $AHEAD."
          # Guard: only treat "true" as force; any other value = skip when up-to-date.
          if [ "$BEHIND" = "0" ] && [ "$FORCE_INPUT" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: No-op exit if up-to-date
        if: steps.detect.outputs.skip == 'true'
        run: |
          echo "Already in sync with enhanced — exiting."
          echo "Enhanced is intentionally a low-velocity fork (Eric outsourc-e)."
          echo "This workflow is expected to no-op most weeks."

      - name: Estimate scope
        if: steps.detect.outputs.skip != 'true'
        id: scope
        run: |
          FILES_CHANGED=$(git diff --name-only "HEAD..${ENHANCED_REMOTE}/main" | wc -l | tr -d ' ')
          LINES=$(git diff --shortstat "HEAD..${ENHANCED_REMOTE}/main" | grep -oE '[0-9]+ insert' | head -1 | grep -oE '[0-9]+' || echo 0)
          {
            echo "files=$FILES_CHANGED"
            echo "lines=$LINES"
          } >> "$GITHUB_OUTPUT"
          echo "Will merge: $FILES_CHANGED files, ~$LINES insertions."

      - name: Create sync branch
        if: steps.detect.outputs.skip != 'true'
        id: branch
        env:
          ENHANCED_HEAD: ${{ steps.detect.outputs.enhanced_head }}
        run: |
          BRANCH="auto/enhanced-sync-$(date +%F)-${ENHANCED_HEAD}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Attempt merge
        if: steps.detect.outputs.skip != 'true'
        id: merge
        run: |
          set +e
          git merge "${ENHANCED_REMOTE}/main" --no-edit
          MERGE_RC=$?
          set -e
          if [ "$MERGE_RC" -eq 0 ]; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
            echo "Clean merge, no conflicts."
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U | wc -l | tr -d ' ')
            {
              echo "status=conflicted"
              echo "conflicts=$CONFLICTS"
            } >> "$GITHUB_OUTPUT"
            echo "Merge halted with $CONFLICTS conflicted files."
          fi

      - name: Resolve conflicts via Claude
        if: steps.merge.outputs.status == 'conflicted'
        id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            BRANCH: ${{ steps.branch.outputs.name }}
            ENHANCED HEAD: ${{ steps.detect.outputs.enhanced_head }}
            CONFLICTED FILES: ${{ steps.merge.outputs.conflicts }}
            COMMITS BEHIND BEFORE MERGE: ${{ steps.detect.outputs.behind }}

            A `git merge enhanced/main` is in progress with conflicts staged.
            Enhanced is the `outsourc-e/hermes-agent` fork — a slow-moving
            Eric fork that tends to ship targeted fixes and web-dashboard
            patches rather than structural vanilla features.

            Read `.github/enhanced-sync-prompt.md` for the full conflict
            resolution policy (different from vanilla — enhanced is smaller
            deltas, more likely to be already-rebranded concepts). Then read
            `.github/enhanced-sync-memory.md` for prior decisions. Resolve
            each conflict, commit the merge, and append memory.

            DO NOT push or open PRs — the workflow handles that next.
          claude_args: |
            --allowedTools "Read,Write,Edit,Grep,Glob,Bash(git:*),Bash(grep:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(awk:*),Bash(sed:*)"

      - name: Verify resolution
        if: steps.merge.outputs.status == 'conflicted'
        id: verify
        run: |
          REMAINING=$(git diff --name-only --diff-filter=U | wc -l | tr -d ' ')
          MARKERS=$(grep -rE '^(<<<<<<<|>>>>>>>) ' \
            --include='*.py' --include='*.json' \
            --include='*.yml' --include='*.yaml' \
            --include='*.toml' --include='*.md' . 2>/dev/null | wc -l | tr -d ' ')
          if [ "$REMAINING" != "0" ] || [ "$MARKERS" != "0" ]; then
            echo "resolved=false" >> "$GITHUB_OUTPUT"
            echo "$REMAINING unresolved files, $MARKERS conflict markers in tree."
          else
            echo "resolved=true" >> "$GITHUB_OUTPUT"
            echo "All conflicts resolved cleanly."
          fi

      - name: Push sync branch
        if: steps.detect.outputs.skip != 'true'
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git push origin "$BRANCH"

      - name: Open PR + enable auto-merge (clean or resolved)
        if: |
          steps.detect.outputs.skip != 'true' &&
          (steps.merge.outputs.status == 'clean' || steps.verify.outputs.resolved == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
          ENHANCED_HEAD: ${{ steps.detect.outputs.enhanced_head }}
          BEHIND: ${{ steps.detect.outputs.behind }}
          FILES: ${{ steps.scope.outputs.files }}
          LINES: ${{ steps.scope.outputs.lines }}
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
          RESOLVED: ${{ steps.verify.outputs.resolved }}
        run: |
          TITLE="auto: enhanced sync ${ENHANCED_HEAD} ($(date +%F))"
          BODY=$(cat <<EOF
          Automated enhanced sync from \`outsourc-e/hermes-agent\`.

          - Commits behind: ${BEHIND}
          - Files changed: ${FILES}
          - Insertions: ~${LINES}
          - Conflicts: ${CONFLICTS:-0} (resolved: ${RESOLVED:-n/a})
          - Enhanced HEAD: \`${ENHANCED_HEAD}\`

          Memory updates are in \`.github/enhanced-sync-memory.md\`.
          Auto-merge ENABLED on this fusion fork — PR merges automatically
          when required checks pass. Vorbium sibling keeps manual review
          (see docs/CROSS_FORK_POLICY.md).
          EOF
          )
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "auto-sync,source-enhanced")
          echo "Created PR: $PR_URL"
          # Fusion-specific: enable auto-merge (squash). Requires "Allow
          # auto-merge" in repo settings. Falls through gracefully if
          # disabled (PR stays open for manual merge).
          gh pr merge "$PR_URL" --auto --squash 2>&1 \
            || echo "auto-merge not enabled or check already failed — PR stays open"

      - name: Open draft PR + flag for human review
        if: |
          steps.detect.outputs.skip != 'true' &&
          steps.merge.outputs.status == 'conflicted' &&
          steps.verify.outputs.resolved != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
          ENHANCED_HEAD: ${{ steps.detect.outputs.enhanced_head }}
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
        run: |
          TITLE="auto: enhanced sync ${ENHANCED_HEAD} — NEEDS HUMAN REVIEW"
          BODY=$(cat <<EOF
          Auto-sync from enhanced ran into conflicts Claude could not
          fully resolve.

          - Conflicts: ${CONFLICTS} files
          - Resolution status: failed or partial

          Branch \`${BRANCH}\` has unresolved markers. Check
          \`.github/last-enhanced-sync-triage.md\` if Claude wrote one
          before giving up. Otherwise, manual merge needed.

          Local fallback: run \`~/scripts/local-upstream-sync.sh --source=enhanced\`
          on a machine with Claude Code installed — it will pick up this
          PR via the \`needs-local-sync-enhanced\` label and retry locally.
          EOF
          )
          gh pr create \
            --draft \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "needs-human-review,needs-local-sync-enhanced,source-enhanced"

      - name: Trigger local fallback issue (if Claude action quota failed)
        if: |
          steps.detect.outputs.skip != 'true' &&
          steps.merge.outputs.status == 'conflicted' &&
          steps.claude.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
          ENHANCED_HEAD: ${{ steps.detect.outputs.enhanced_head }}
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
        run: |
          TITLE="Local fallback needed: enhanced sync ${ENHANCED_HEAD}"
          BODY=$(cat <<EOF
          Claude Code Action failed (likely quota or transient error)
          during enhanced sync.

          Branch: \`${BRANCH}\`
          Conflicts: ${CONFLICTS} files
          Enhanced HEAD: \`${ENHANCED_HEAD}\`

          Run local fallback:
          \`\`\`
          cd ~/Documents/Aplicativos/hermes-agent-fusion
          git fetch canonical-runtime
          git checkout ${BRANCH}
          ~/scripts/local-upstream-sync.sh --source=enhanced
          \`\`\`

          The local script polls issues with \`needs-local-sync-enhanced\`
          label every 4h and retries automatically.
          EOF
          )
          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label "needs-local-sync-enhanced,auto-sync-failure,source-enhanced"
